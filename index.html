<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Mulher Financeira</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f7f2ed;
margin:0;
padding:30px;
color:#3b2f27;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

h1{
margin-top:0;
}

.question{
margin-top:25px;
}

.option{
display:block;
margin:8px 0;
padding:10px;
border:1px solid #e5d8cc;
border-radius:8px;
cursor:pointer;
}

button{
margin-top:25px;
padding:14px;
width:100%;
border:none;
border-radius:30px;
background:#c79b63;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#b4864e;
}

input[type=text],input[type=email]{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>Que Tipo de Mulher Financeira És?</h1>

<form id="quizForm">

<label>Nome</label>
<input id="nome" type="text" required>

<label>Email</label>
<input id="email" type="email" required>

<label>
<input id="consent" type="checkbox">
Autorizo o tratamento destes dados
</label>


<div class="question">
<p><b>Pergunta 1</b></p>

<label class="option">
<input type="radio" name="q1" value="A"> Pago contas e depois vejo
</label>

<label class="option">
<input type="radio" name="q1" value="B"> Tento organizar
</label>

<label class="option">
<input type="radio" name="q1" value="C"> Já tenho sistema
</label>

<label class="option">
<input type="radio" name="q1" value="D"> Distribuo estrategicamente
</label>
</div>


<div class="question">
<p><b>Pergunta 2</b></p>

<label class="option">
<input type="radio" name="q2" value="A"> Ansiedade
</label>

<label class="option">
<input type="radio" name="q2" value="B"> Preocupação
</label>

<label class="option">
<input type="radio" name="q2" value="C"> Controlo
</label>

<label class="option">
<input type="radio" name="q2" value="D"> Confiança
</label>
</div>


<div class="question">
<p><b>Pergunta 3</b></p>

<label class="option">
<input type="radio" name="q3" value="A"> Não tenho poupança
</label>

<label class="option">
<input type="radio" name="q3" value="B"> Tenho pouco
</label>

<label class="option">
<input type="radio" name="q3" value="C"> Tenho alguma
</label>

<label class="option">
<input type="radio" name="q3" value="D"> Tenho estratégia
</label>
</div>


<div class="question">
<p><b>Pergunta 4</b></p>

<label class="option">
<input type="radio" name="q4" value="A"> Desorganiza
</label>

<label class="option">
<input type="radio" name="q4" value="B"> Complica
</label>

<label class="option">
<input type="radio" name="q4" value="C"> Consigo lidar
</label>

<label class="option">
<input type="radio" name="q4" value="D"> Tenho fundo
</label>
</div>


<div class="question">
<p><b>Pergunta 5</b></p>

<label class="option">
<input type="radio" name="q5" value="A"> Evito decidir
</label>

<label class="option">
<input type="radio" name="q5" value="B"> Decido com dúvida
</label>

<label class="option">
<input type="radio" name="q5" value="C"> Analiso
</label>

<label class="option">
<input type="radio" name="q5" value="D"> Estratégia
</label>
</div>


<div class="question">
<p><b>Pergunta 6</b></p>

<label class="option">
<input type="radio" name="q6" value="A"> Parar stress
</label>

<label class="option">
<input type="radio" name="q6" value="B"> Organizar
</label>

<label class="option">
<input type="radio" name="q6" value="C"> Estabilidade
</label>

<label class="option">
<input type="radio" name="q6" value="D"> Fazer dinheiro crescer
</label>
</div>


<button type="submit">Ver o meu resultado</button>

</form>

</div>

<script>

const APPS_SCRIPT_URL="COLE_AQUI_O_LINK_DO_GOOGLE_SCRIPT";

document.getElementById("quizForm").addEventListener("submit",function(e){

e.preventDefault();

const nome=document.getElementById("nome").value;
const email=document.getElementById("email").value;
const consent=document.getElementById("consent").checked;

if(!nome||!email||!consent){
alert("Preenche os dados primeiro");
return;
}

let score=0;

document.querySelectorAll("input[type=radio]:checked").forEach(el=>{

if(el.value==="A")score+=1;
if(el.value==="B")score+=2;
if(el.value==="C")score+=3;
if(el.value==="D")score+=4;

});

const data={

nome:nome,
email:email,
score:score

};

fetch(APPS_SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
}).catch(()=>{});

window.location.href="resultado.html?score="+score;

});
</script>

</body>
</html>
