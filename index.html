<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste Financeiro</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0d0d;
      color: #fff;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    h1 {
      font-size: 40px;
      line-height: 1.1;
      margin: 0 0 16px;
      text-align: center;
    }

    .highlight {
      color: #e6c07b;
    }

    .sub {
      max-width: 640px;
      margin: 0 auto 28px;
      text-align: center;
      font-size: 18px;
      line-height: 1.5;
      color: #cfcfcf;
    }

    .top-boxes {
      display: grid;
      gap: 12px;
      margin: 0 auto 30px;
      max-width: 640px;
    }

    .box {
      background: #171717;
      border: 1px solid rgba(230, 192, 123, 0.18);
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 16px;
      line-height: 1.5;
    }

    .form-wrap {
      background: #111;
      border: 1px solid rgba(230, 192, 123, 0.18);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    iframe {
      width: 100%;
      min-height: 1250px;
      border: 0;
      border-radius: 12px;
      background: #fff;
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      font-size: 12px;
      color: #8f8f8f;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 32px;
      }

      .sub {
        font-size: 16px;
      }

      iframe {
        min-height: 1350px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Que tipo de mulher <span class="highlight">financeira</span> és?</h1>

    <p class="sub">
      Responde a 6 perguntas e descobre o que está a travar
      ou a acelerar o teu dinheiro.
    </p>

    <div class="top-boxes">
      <div class="box">👉 Descobre o teu perfil financeiro</div>
      <div class="box">👉 Percebe o teu maior erro neste momento</div>
      <div class="box">👉 Recebe clareza sobre o próximo passo</div>
    </div>

    <div class="form-wrap">
      <iframe
        data-tally-src="https://tally.so/embed/KYLaMk?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        loading="lazy"
        title="Teste Financeiro">
      </iframe>
    </div>

    <div class="footer">Marisa Carreiro — Finanças Pessoais</div>
  </div>

  <script>
    var d = document, w = "https://tally.so/r/KYLaMk", v = function () {
      if (typeof Tally !== "undefined") {
        Tally.loadEmbeds();
      } else {
        d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) {
          e.src = e.dataset.tallySrc;
        });
      }
    };
    if (typeof Tally !== "undefined") {
      v();
    } else if (d.querySelector('script[src="' + w + '"]') == null) {
      var s = d.createElement("script");
      s.src = w;
      s.onload = v;
      s.onerror = v;
      d.body.appendChild(s);
    }
  </script>
</body>
</html>
