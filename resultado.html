<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Resultado</title>

<style>
body{
font-family:Arial;
background:#f7f2ed;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:12px;
max-width:500px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="card">

<h1 id="titulo"></h1>

<p id="texto"></p>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const score=parseInt(params.get("score"));

let titulo="";
let texto="";

if(score>=21){
titulo="Mulher em Expansão";
texto="Já tens organização financeira e estás pronta para crescer.";
}

else if(score>=17){
titulo="Mulher em Consolidação";
texto="Tens base financeira e estás a estruturar melhor o teu dinheiro.";
}

else if(score>=12){
titulo="Mulher em Estrutura";
texto="Estás a construir organização financeira.";
}

else{
titulo="Mulher em Despertar";
texto="Estás a começar a organizar a tua relação com o dinheiro.";
}

document.getElementById("titulo").innerText=titulo;
document.getElementById("texto").innerText=texto;

</script>

</body>
</html>
